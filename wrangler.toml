name = "sales-tracker"
main = "worker.js"
compatibility_date = "2024-09-23"

# ── D1 Database binding ────────────────────────────────────────────────────────
[[d1_databases]]
binding  = "DB"                         # env.DB inside worker.js
database_name = "sales_tracker_db"      # friendly name
database_id   = "REPLACE_WITH_YOUR_D1_ID"   # see setup steps below

# ── Static assets (optional — only if you serve index.html from the same worker)
# [site]
# bucket = "./public"


# ══════════════════════════════════════════════════════════════════════════════
# SETUP STEPS
# ══════════════════════════════════════════════════════════════════════════════
#
# 1. Install Wrangler (if not already):
#       npm install -g wrangler
#
# 2. Log in to Cloudflare:
#       wrangler login
#
# 3. Create the D1 database:
#       wrangler d1 create sales_tracker_db
#    Copy the "database_id" from the output and paste it above.
#
# 4. Apply the SQL schema locally (for testing):
#       wrangler d1 execute sales_tracker_db --local --file=schema.sql
#
# 5. Apply the schema to production:
#       wrangler d1 execute sales_tracker_db --file=schema.sql
#
# 6. Run locally (local D1 mode):
#       wrangler dev --local
#
# 7. Deploy to Cloudflare:
#       wrangler deploy
#
# 8. After deploy, open index.html in a browser and update the API_BASE
#    constant at the top of the <script> block to your Worker URL, e.g.:
#       const API_BASE = 'https://sales-tracker.<your-subdomain>.workers.dev';
#
# ══════════════════════════════════════════════════════════════════════════════
